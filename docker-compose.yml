services:
  parser:
    build: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://parser:parser@db:5432/parser
      - CONCURRENCY=5
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "src.main", "/app/data/inns.xlsx"]

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: parser
      POSTGRES_PASSWORD: parser
      POSTGRES_DB: parser
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parser"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
